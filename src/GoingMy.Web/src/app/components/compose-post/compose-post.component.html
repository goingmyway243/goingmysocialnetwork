<!-- ── Trigger Bar ──────────────────────────────────────── -->
<div class="compose-trigger" (click)="openDialog()">
  <div class="trigger-avatar">
    <i class="pi pi-user"></i>
  </div>
  <div class="trigger-input-mock">
    <span>What's on your mind?</span>
  </div>
  <p-button
    icon="pi pi-image"
    [text]="true"
    styleClass="trigger-media-btn"
    (onClick)="$event.stopPropagation(); openDialog()">
  </p-button>
</div>

<!-- ── Compose Modal ────────────────────────────────────── -->
<p-dialog
  header="Create Post"
  [modal]="true"
  [(visible)]="dialogVisible"
  [style]="{ width: '560px' }"
  [draggable]="false"
  [resizable]="false"
  styleClass="glass-dialog compose-content"
  (onHide)="closeDialog()">

  <!-- Content field -->
  <div class="dialog-field">
    <textarea
      pTextarea
      [autoResize]="true"
      rows="5"
      placeholder="Share something with your network..."
      class="dialog-content-input"
      [value]="content()"
      (input)="onContentChange($any($event.target).value)"
      [class.invalid]="contentTooLong()"
      [disabled]="submitting()">
    </textarea>
    <span class="char-counter" [class.warn]="contentTooLong()">
      {{ contentLength() }}/2000
    </span>
  </div>

  <!-- AI Writing Assistant -->
  <div class="ai-toolbar-wrapper">
    <button
      class="ai-toggle-btn"
      type="button"
      [class.active]="aiPanelVisible()"
      (click)="toggleAiPanel()"
      [disabled]="submitting()">
      <span class="ai-icon">✦</span>
      <span>AI Assistant</span>
    </button>

    @if (aiPanelVisible()) {
      <div class="ai-panel">
        <!-- Action buttons -->
        <div class="ai-actions">
          <button class="ai-action-btn" type="button" (click)="runAiAction('suggest')" [disabled]="aiLoading()">Suggest</button>
          <button class="ai-action-btn" type="button" (click)="runAiAction('improve')" [disabled]="aiLoading() || !isValid()">Improve</button>
          <button class="ai-action-btn" type="button" (click)="runAiAction('grammar')" [disabled]="aiLoading() || !isValid()">Grammar</button>
          <button class="ai-action-btn" type="button" (click)="runAiAction('shorten')" [disabled]="aiLoading() || !isValid()">Shorten</button>
          <button class="ai-action-btn" type="button" (click)="runAiAction('lengthen')" [disabled]="aiLoading() || !isValid()">Lengthen</button>
        </div>

        <!-- Tone row -->
        <div class="ai-tone-row">
          <p-select
            [options]="toneOptions"
            [(ngModel)]="selectedTone"
            optionLabel="label"
            optionValue="value"
            appendTo="body"
            styleClass="ai-tone-select">
          </p-select>
          <button class="ai-action-btn tone-btn" type="button" (click)="runAiAction('tone')" [disabled]="aiLoading() || !isValid()">Apply Tone</button>
        </div>

        <!-- Loading -->
        @if (aiLoading()) {
          <div class="ai-loading">
            <i class="pi pi-spin pi-spinner"></i>
            <span>Generating suggestion…</span>
          </div>
        }

        <!-- AI Error -->
        @if (aiError()) {
          <div class="ai-error">
            <i class="pi pi-exclamation-circle"></i>
            {{ aiError() }}
          </div>
        }

        <!-- Suggestion result -->
        @if (hasAiSuggestion()) {
          <div class="ai-suggestion">
            <p class="ai-suggestion-text">{{ aiSuggestion() }}</p>
            <div class="ai-suggestion-actions">
              <button class="ai-use-btn" type="button" (click)="applySuggestion()">
                <i class="pi pi-check"></i> Use this
              </button>
              <button class="ai-dismiss-btn" type="button" (click)="dismissSuggestion()">
                <i class="pi pi-times"></i> Dismiss
              </button>
            </div>
          </div>
        }
      </div>
    }
  </div>

  <!-- Error -->
  @if (error()) {
    <div class="dialog-error">
      <i class="pi pi-exclamation-circle"></i>
      {{ error() }}
    </div>
  }

  <!-- Footer actions -->
  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <p-button
        label="Cancel"
        [text]="true"
        styleClass="cancel-btn"
        [disabled]="submitting()"
        (onClick)="closeDialog()">
      </p-button>
      <p-button
        label="Post"
        icon="pi pi-send"
        [loading]="submitting()"
        [disabled]="!canSubmit()"
        styleClass="post-btn"
        (onClick)="submit()">
      </p-button>
    </div>
  </ng-template>
</p-dialog>
