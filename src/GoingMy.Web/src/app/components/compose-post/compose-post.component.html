<p-card styleClass="compose-card">
  <div class="compose-header">
    <div class="author-avatar">
      <i class="pi pi-user"></i>
    </div>
    <span class="compose-label">What's on your mind?</span>
  </div>

  <div class="compose-fields">
    <div class="field">
      <input
        pInputText
        type="text"
        placeholder="Title"
        class="compose-title-input"
        [value]="title()"
        (input)="onTitleChange($any($event.target).value)"
        [class.invalid]="titleTooLong()"
        [disabled]="submitting()" />
      @if (titleTooLong()) {
        <span class="char-warn">{{ titleLength() }}/200 — title too long</span>
      }
    </div>

    <div class="field">
      <textarea
        pTextarea
        [autoResize]="true"
        rows="3"
        placeholder="Share something with your network..."
        class="compose-content-input"
        [value]="content()"
        (input)="onContentChange($any($event.target).value)"
        [class.invalid]="contentTooLong()"
        [disabled]="submitting()">
      </textarea>
      <span class="char-counter" [class.warn]="contentTooLong()">
        {{ contentLength() }}/2000
      </span>
    </div>
  </div>

  @if (error()) {
    <div class="compose-error">
      <i class="pi pi-exclamation-circle"></i>
      {{ error() }}
    </div>
  }

  <div class="compose-actions">
    <p-button
      label="Post"
      icon="pi pi-send"
      [loading]="submitting()"
      [disabled]="!canSubmit()"
      styleClass="post-btn"
      (onClick)="submit()">
    </p-button>
  </div>
</p-card>
