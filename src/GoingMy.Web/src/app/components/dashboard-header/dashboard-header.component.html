<div class="dashboard-header">
  <div class="header-left">
    <div class="logo" (click)="navigateToHome()">
      <i class="pi pi-globe"></i>
      <span class="logo-text">GoingMySocial</span>
    </div>
  </div>

  <div class="header-center">
    <span class="p-input-icon-left search-container">
      <i class="pi pi-search"></i>
      <input 
        type="text" 
        pInputText 
        [(ngModel)]="searchValue"
        placeholder="Search for creators, inspirations, and projects"
        class="search-input"
        (keydown.enter)="onSearch()" />
    </span>
  </div>

  <div class="header-right">
    <app-notification-bell></app-notification-bell>

    <p-button 
      [icon]="themeService.theme() === 'dark' ? 'pi pi-sun' : 'pi pi-moon'"
      [text]="true" 
      [rounded]="true"
      styleClass="icon-btn theme-toggle-btn"
      [title]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      (onClick)="themeService.toggle()"></p-button>

    @if (currentUserAvatarUrl()) {
      <img 
        class="header-user-avatar" 
        [src]="currentUserAvatarUrl()!" 
        alt="Your avatar" 
        (click)="toggleUserMenu($event)" />
    }
    @else {
      <p-button 
        icon="pi pi-user" 
        [text]="true" 
        [rounded]="true"
        styleClass="icon-btn"
        (onClick)="toggleUserMenu($event)"></p-button>
    }
    
    <p-menu #userMenu [model]="userMenuItems" [popup]="true" styleClass="glass-menu"></p-menu>
  </div>
</div>
