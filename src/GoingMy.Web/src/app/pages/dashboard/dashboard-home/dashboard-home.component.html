<div class="dashboard-home">
  <!-- Compose Post -->
  <app-compose-post (postCreated)="onPostCreated($event)"></app-compose-post>

  @if (loading()) {
    <div class="posts-container">
      @for (item of [1, 2, 3]; track item) {
        <p-card styleClass="post-card loading-card">
          <div class="post-header">
            <p-skeleton shape="circle" size="3rem"></p-skeleton>
            <div class="post-meta">
              <p-skeleton width="10rem" height="1rem"></p-skeleton>
              <p-skeleton width="5rem" height="0.875rem"></p-skeleton>
            </div>
          </div>
          <p-skeleton width="100%" height="1.5rem" styleClass="mb-2"></p-skeleton>
          <p-skeleton width="100%" height="4rem"></p-skeleton>
          <div class="post-actions">
            <p-skeleton width="4rem" height="2.5rem"></p-skeleton>
            <p-skeleton width="4rem" height="2.5rem"></p-skeleton>
            <p-skeleton width="4rem" height="2.5rem"></p-skeleton>
          </div>
        </p-card>
      }
    </div>
  } @else if (error()) {
    <div class="error-container">
      <i class="pi pi-exclamation-triangle error-icon"></i>
      <p class="error-message">{{ error() }}</p>
      <p-button label="Retry" icon="pi pi-refresh" (onClick)="loadPosts()"></p-button>
    </div>
  } @else {
    <div class="posts-container">
      @if (posts().length === 0) {
        <app-empty-state
          icon="pi-inbox"
          title="No posts yet"
          subtitle="Be the first to share something above!">
        </app-empty-state>
      } @else {
        @for (post of posts(); track post.id) {
          <app-post-card
            [post]="post"
            [commentState]="getCommentState(post.id)"
            [liked]="isLiked(post)"
            (likeToggle)="toggleLike($event)"
            (commentsToggle)="toggleComments($event)"
            (newCommentInput)="onNewCommentChange($event.postId, $event.value)"
            (commentSubmit)="submitComment($event)"
            (detailView)="viewPostDetail($event)"
            (editPost)="editPost($event)"
            (deletePost)="deletePost($event)"
            (authorClick)="navigateToProfile($event)">
          </app-post-card>
        }
      }
    </div>
  }
</div>
