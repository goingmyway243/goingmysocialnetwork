@if (fullSize) {
  <div class="create-post-bar" (click)="openDialog()">
    <user-avatar [user]="currentUser" [showInfo]="false"></user-avatar>
    <div class="placeholder">
      {{ placeholder }}
    </div>
  </div>
}
@if (!fullSize) {
  <button class="primary create-post-button" (click)="openDialog()">
    {{ buttonText }}
  </button>
}
